name: Permission Audit

on:
  push:
    branches:
      - master
  pull_request:

permissions:
  checks: write
  contents: read

jobs:
  audit-permissions:
    name: Audit server permission guards
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Run permission audit
        run: node tools/audit-permissions.mjs
