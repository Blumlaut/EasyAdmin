name: Prepare Release
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version Number'
        required: true
      release_type:
        description: 'Release Type'
        required: true
        default: 'stable'
        type: choice
        options:
          - stable
          - beta

jobs:
  create:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@master

    - name: Set up Node.js 22
      uses: actions/setup-node@v6
      with:
        node-version: '22'

    - name: Install dependencies
      run: npm run install:all

    - name: Typecheck bot
      run: cd bot && npm run typecheck

    - name: Build bot + NUI
      run: npm run build

    - name: Get previous tag
      id: previous_tag
      run: |
        PREVIOUS_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
        echo "previous_tag=$PREVIOUS_TAG" >> "$GITHUB_OUTPUT"

    - name: Generate changelog
      id: generate_changelog
      run: |
        if [ -n "${{ steps.previous_tag.outputs.previous_tag }}" ]; then
          CHANGELOG=$(git log --pretty=format:"- %s" ${{ steps.previous_tag.outputs.previous_tag }}..HEAD)
        else
          CHANGELOG=$(git log --pretty=format:"- %s")
        fi
        echo "changelog<<EOF" >> "$GITHUB_OUTPUT"
        echo "$CHANGELOG" >> "$GITHUB_OUTPUT"
        echo "EOF" >> "$GITHUB_OUTPUT"

    - name: Remove existing tag + release (if any)
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        TAG="${{ github.event.inputs.version }}"
        # Check if the tag exists remotely
        if git ls-remote --tags origin "refs/tags/$TAG" | grep -q "$TAG"; then
          echo "Tag $TAG already exists — removing old tag and release"
          # Delete the existing GitHub release via API
          RELEASE_ID=$(curl -s -H "Authorization: Bearer $GITHUB_TOKEN" \
            "https://api.github.com/repos/${{ github.repository }}/releases/tags/$TAG" \
            | jq -r '.id // empty')
          if [ -n "$RELEASE_ID" ]; then
            curl -s -X DELETE -H "Authorization: Bearer $GITHUB_TOKEN" \
              "https://api.github.com/repos/${{ github.repository }}/releases/$RELEASE_ID" \
              && echo "Deleted existing release" || echo "Failed to delete release (may not exist)"
          fi
          # Delete the remote tag
          git push https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }} --delete "$TAG"
          # Remove any local copy
          git tag -d "$TAG" 2>/dev/null || true
        fi

    - name: Package release
      run: |
        zip -r "EasyAdmin-${{ github.event.inputs.version }}.zip" . \
          -x ".git" \
          -x ".git/*" \
          -x ".github/*" \
          -x ".agents/*" \
          -x "*node_modules/*" \
          -x "*data/*" \
          -x "*tests/*" \
          -x "*tools/*" \
          -x "*PLANS/*" \
          -x "*package-lock.json"

    - name: Create Release
      uses: softprops/action-gh-release@v2
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ github.event.inputs.version }}
        name: EasyAdmin ${{ github.event.inputs.version }}${{ github.event.inputs.release_type == 'beta' && ' (Beta)' || '' }}
        body: |
          # EasyAdmin ${{ github.event.inputs.version }}

          ## What's Changed
          ${{ steps.generate_changelog.outputs.changelog }}

          Supported by:
          <a href='https://zap-hosting.com/easyadmin'><img src="https://zap-cdn.com/interface/_images/banner/gameserver/fivem-affiliate-banner-1006x180.png" alt="ZAP-Hosting Gameserver and Webhosting"></a>
          <p align="center">10% Discount Code: <b>EasyAdmin</b></p>

          **Full Changelog**: https://github.com/Blumlaut/EasyAdmin/compare/${{ steps.previous_tag.outputs.previous_tag }}...${{ github.event.inputs.version }}
        draft: false
        prerelease: ${{ github.event.inputs.release_type == 'beta' }}
        files: EasyAdmin-${{ github.event.inputs.version }}.zip

    - name: Push Tag
      run: |
            echo "version is ${{ github.event.inputs.version }}"
            git config user.name "GitHub Actions Bot"
            git config user.email "<>"
            sed -i "/is_master/d" fxmanifest.lua
            sed -i "/^version/c\version '${{ github.event.inputs.version }}'" fxmanifest.lua
            git add .
            git commit -m "${{ github.event.inputs.version }}"
            git tag -a ${{ github.event.inputs.version }} -m "Version ${{ github.event.inputs.version }}"
            sed -i "/^version/ais_master 'yes'" fxmanifest.lua
            git add .
            git commit -m "Update Version"
            git push --follow-tags
