site_name: EasyAdmin
site_description: EasyAdmin Documentation

repo_url: "https://github.com/Blumlaut/EasyAdmin"
edit_uri: "https://github.com/Blumlaut/EasyAdmin/edit/main/docs/docs/"

markdown_extensions:
  - pymdownx.highlight:
      linenums: true
  - pymdownx.superfences
  - toc:
      permalink: True
  - pymdownx.tabbed:
      alternate_style: true


plugins:
  - search
  - git-revision-date

theme:
  name: material
  logo: assets/logo.png
  favicon: assets/favicon.png
  palette:
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: blue
      accent: blue
      toggle:
        icon: material/toggle-switch
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: light blue
      accent: light blue
      toggle:
        icon: material/toggle-switch-off-outline
        name: Switch to dark mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.top
    - navigation.expand
    - search.highlight
    - toc.integrate


extra_css:
  - stylesheets/extra.css

nav:
    - "Home": 'index.md'
    - 'install.md'
    - Configuration:
        - 'configuration/basic.md'
        - 'configuration/webhooks.md'
        - 'configuration/commands.md'
        - 'configuration/action-history.md'
        - 'configuration/backups.md'
        - 'configuration/shortcuts.md'
        - 'configuration/advanced.md'
        - 'configuration/nui-settings.md'
    - Permissions:
        - 'permissions/index.md'
        - 'permissions/player-permissions.md'
        - 'permissions/server-permissions.md'
        - 'permissions/bot-permissions.md'
    - Discord Integration:
        - 'discord/bot-setup.md'
        - 'discord/bot-commands.md'
        - 'discord/logging.md'
        - 'discord/chat-bridge.md'
        - 'discord/server-status.md'
        - 'discord/discord-ace.md'
    - Features:
        - 'features/ban-list.md'
        - 'features/reports.md'
        - 'features/action-history.md'
        - 'features/admin-notes.md'
        - 'features/screenshots.md'
        - 'features/reminders-and-shortcuts.md'
        - 'features/backups.md'
        - 'features/allowlist.md'
        - 'features/player-statistics.md'
        - 'features/network-monitor.md'
        - 'features/profiler.md'
        - 'features/resource-monitor.md'
    - NUI:
        - 'nui/design-system.md'
        - 'nui/pages.md'
        - 'nui/known-issues.md'
    - Plugins:
        - 'plugins/index.md'
        - 'plugins/creating-plugins.md'
        - 'plugins/plugin-api.md'
        - 'plugins/custom-permissions.md'
    - i18n:
        - 'i18n/translating.md'
    - Reference:
        - 'reference/convar-reference.md'
        - 'reference/permission-reference.md'
        - 'reference/command-reference.md'
    - Updates:
        - 'updates/updating.md'
    - 'troubleshooting.md'
