# Linter configuration for scripts/lint-lua.py

# Paths to exclude from all checks (fnmatch globs relative to resource root)
exclude = [
    "examples/**",
    "tests/**",
]

# Additional functions to treat as "used" (plugin APIs, external entry points)
[allowlist]
functions = [
    # Client plugin API
    "IsNuiBackground",
    "RegisterEasyAdminPluginHandler",
    "HasEasyAdminPluginHandler",
    "addPlugin",
    # Server plugin API
    "RegisterEasyAdminPluginServerHandler",
]

# NUICallbacks called dynamically from the NUI (e.g. callLua(action) where action is a variable)
# These are genuine entry points but the linter can't detect dynamic calls
nui_callbacks = [
    # Settings page: callLua(action) where action is from a button click
    "refreshBanList",
    "refreshCachedPlayers",
    "refreshPermissions",
    # Player actions: callLua(opt.action, ...) from TELEPORT_OPTIONS array
    "teleportToPlayer",
    "teleportMeBack",
    "teleportPlayerBack",
    "teleportIntoVehicle",
]
